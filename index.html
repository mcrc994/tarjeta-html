<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta Responsive</title>

    <style>
        /* IMPORTANTE: box-sizing */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            max-width: 320px;
            width: 100%;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 14px;
            margin-bottom: 15px;
            color: #555;
        }

        .card button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #007BFF;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .card button:hover {
            background: #0056b3;
        }

        /* Responsive (aunque ya está adaptado) */
        @media (max-width: 400px) {
            .card {
                padding: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Curso de HTML y CSS</h2>
        <p>Aprende a crear páginas web modernas desde cero con diseño responsive.</p>
        <button>Inscribirme</button>
    </div>

</body>

</html>
