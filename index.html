<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjeta</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: Arial;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    max-width: 320px;
    width: 100%;
    padding: 20px;
    border-radius: 10px;
}

.btn {
    display: block;
    background: blue;
    color: white;
    text-align: center;
    padding: 10px;
    margin-top: 10px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="card">
    <h2>Curso HTML</h2>
    <p>Aprende a crear páginas web fáciles.</p>
    <a href="#" class="btn">Inscribirme</a>
</div>

</body>
</html>
