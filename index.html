<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h2>Tabla con Flexbox</h2>

    <div class="tabla-flex">
        <div class="fila">
            <div class="celda">Nombre</div>
            <div class="celda">Edad</div>
        </div>

        <div class="fila">
            <div class="celda">María</div>
            <div class="celda">31</div>
        </div>
    </div>

    <h2>Tabla con Grid</h2>

    <div class="tabla-grid">
        <div>Nombre</div>
        <div>Edad</div>
        <div>María</div>
        <div>31</div>
    </div>

</body>

</html>
